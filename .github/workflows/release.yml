name: Release

on:
  push:
    tags:
      - 'v*'
  # orchestrator 入口：dispatch 只创建 tag（用 CROSS_REPO_TOKEN，PAT 才能让 tag-push
  # 再触发 ci+publish），真正发布仍只走 tag-push 路径。详见 ADR 0023 阶段2。
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的 npm 版本（不含 v 前缀），须等于 package.json version'
        required: true
        type: string
      artifactIds:
        required: false
        type: string
      trainId:
        required: false
        type: string

concurrency:
  group: release-${{ github.repository }}-${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}
  cancel-in-progress: false

jobs:
  # dispatch 路径：仅创建 tag（用 PAT），让既有 tag-push ci+publish 复用。
  create-tag:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          fetch-depth: 0
      - name: Create & push release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::dispatch version ($VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          TAG="v${VERSION}"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            TAG_SHA=$(git rev-list -n1 "$TAG"); HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "::notice::$TAG already on this commit → no-op (idempotent)"; exit 0
            fi
            echo "::error::$TAG exists but points to $TAG_SHA, not HEAD $HEAD_SHA"; exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  # First run CI to ensure tests pass（仅 tag-push 路径）
  ci:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Run golden tests
        run: pnpm run test:golden

  # Publish to npm only after CI passes
  publish:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify package version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm (Trusted Publisher)
        run: pnpm publish --no-git-checks --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false

      # 下游 consumer 升级触发是**尽力而为**：npm publish + GitHub Release 已在上面完成，
      # 这些步骤失败（如目标仓缺 workflow_dispatch / 临时不可达）绝不能让已成功的发布变红，
      # 否则 release-train 会把整个 publish run 判定为 failure 而中断列车（ADR 0023 §9 实证：
      # aster-lang-dev/auto-upgrade.yml 无 workflow_dispatch → HTTP 422 拖垮 ts 1.0.5 发车）。
      - name: Trigger aster-cloud dependency upgrade
        continue-on-error: true
        run: |
          gh workflow run auto-upgrade.yml \
            --repo aster-cloud/aster-cloud \
            --field version=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Trigger aster-lang-dev dependency upgrade
        continue-on-error: true
        run: |
          gh workflow run auto-upgrade.yml \
            --repo aster-cloud/aster-lang-dev \
            --field version=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
