name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 ref 上新 push 到来时取消尚在跑的过时 CI（PR 连续 push 常见）——省算力/排队。
# 该仓 CI 无发布/部署副作用（release 是独立 workflow），故可直接 cancel 过时 run。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 防漂移 gate（ADR 0023 阶段6）：本仓 npm 版本须符合 release-plan.json。
      # ts 无 platform 依赖，为 gate 单独 checkout platform。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Release-plan drift gate
        run: |
          python3 aster-lang-platform/scripts/release-plan/check-artifact.py \
            --plan aster-lang-platform/release-plan.json \
            --artifact ts:npm --repo-root .

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # version is read from package.json's "packageManager"
          package_json_file: package.json

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # （已移除 vendor tarball SLA enforcement —— #26 fixed：@aster-cloud/aster-lang-test
      # 已发到公共 npm（1.0.3 起为当前 named-syntax corpus；1.0.2 是陈旧 positional
      # 快照不可用），依赖切回 ^1.0.3 semver，vendored tarball 已删，技术债清除。）

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Run unit tests with coverage
        run: pnpm run test:unit:coverage

      - name: Check coverage threshold
        run: |
          pnpm run build
          npx c8 --check-coverage --lines 75 --branches 60 --functions 70 \
            node --test 'dist/test/unit/**/*.test.js' 'dist/test/type-checker/**/*.test.js'

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run golden tests
        run: pnpm run test:golden:run

      - name: Run property tests
        run: pnpm run test:property:run

      - name: Run fuzz tests
        run: pnpm run test:fuzz:run

      # P0-R15/R16/R17: artifact-level browser entry verification.
      # 源码层 AST scanner 看不到编译产物层的真实依赖闭包. R14 的 aster-cloud
      # CI build regression (vendor tarball typecheck-pii.js 拉入 server-side
      # typecheck.js → node:fs/path/perf_hooks) 证明必须在 package 自身 CI
      # 做 artifact-level smoke. 这一步从 dist/src/browser.js 做 BFS 闭包扫描,
      # 禁止任何 Node built-in (含 `node:*` scheme + bare specifier 如 `fs`/`path`)
      # 出现在 browser entry transitive closure. 用 `node:module.isBuiltin()` 作为
      # 权威源, 不再手维护 deny list.
      - name: Verify browser entry has no Node builtin deps
        run: node scripts/verify-browser-entry.mjs

  # Strict tier1 dual-engine parity gate. Mirrors aster-lang-test +
  # aster-lang-core jobs so a TS parser/lexer/canonicalizer change that
  # breaks bidirectional parity is blocked at the source PR.
  parity-tier1:
    name: Strict tier1 parity — parse (TS ↔ Java)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # R-CI-1 fix: paths-filter needs a checkout to diff against. Do
      # the self-checkout first into a sub-path, then point paths-filter
      # at it with working-directory.
      - name: Self checkout
        uses: actions/checkout@v6
        with:
          path: aster-lang-ts
          fetch-depth: 0

      - name: Decide whether to run
        id: changed
        uses: dorny/paths-filter@v4
        with:
          working-directory: aster-lang-ts
          filters: |
            parity:
              # Anything that can change the parse surface — keep this
              # broad. False positives cost a CI minute; false negatives
              # let parser drift land silently. (Codex review R1 raised
              # the original list missed src/parser*, src/peg/**,
              # src/cst/**, src/lower_to_core.ts, src/core/**.)
              - 'src/parser.ts'
              - 'src/parser/**'
              - 'src/peg/**'
              - 'src/cst/**'
              - 'src/frontend/**'
              - 'src/config/**'
              - 'src/ast/**'
              - 'src/core/**'
              - 'src/lib/**'
              - 'src/types/**'
              - 'src/types.ts'
              - 'src/diagnostics/**'
              - 'src/lower_to_core.ts'
              - 'src/browser.ts'
              - 'src/index.ts'
              - 'src/manifest.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

      - name: Checkout aster-lang-test
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-test
          path: aster-lang-test
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # 共享版本目录（aster-lang-platform, ADR 0012）。aster-lang-core 经
      # asterLibs.* 引用它，publish core 前必须先把它发到 Maven Local，否则
      # 解析 cloud.aster-lang:aster-lang-platform 失败。
      - name: Checkout aster-lang-platform
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout aster-lang-core
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # 语言包源：aster-lang-locales（现役，catalog 驱动）。旧独立 en/zh/de 仓
      # 已归档且 pin core 1.0.2，与 catalog 1.0.3 漂移——迁移到 aster-lang-locales
      # （与 aster-lang-core / aster-lang-test ci.yml 一致）。
      - name: Checkout aster-lang-locales
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-locales
          path: aster-lang-locales
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # aster-lang-hi 语言包（hi-IN SPI）：core 的 testRuntimeOnly(asterLibs.hi) +
      # langPacks(asterLibs.hi)（lexicon-hi 合并后新增）令 core 的 testRuntimeClasspath
      # 解析 aster-lang-hi:<catalog 版本>。该版本未发布到 GH Packages（免发版迁移），
      # 故须源码 checkout + publishToMavenLocal（镜像 aster-lang-core 自身 CI），否则
      # 401。缺这步会让 parity gate 在 core test classpath 解析阶段就红。
      - name: Checkout aster-lang-hi
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-hi
          path: aster-lang-hi
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # aster-lang-runtime + aster-lang-truffle are only needed by the
      # Phase C evaluator step (CoreIrEvalCli lives in truffle).
      - name: Checkout aster-lang-runtime
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Checkout aster-lang-truffle
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Setup pnpm
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: pnpm/action-setup@v6
        with:
          package_json_file: aster-lang-ts/package.json

      - name: Setup Node
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - name: Setup Java
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build aster-lang-ts (the version under PR)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      # See aster-lang-test/.github/workflows/ci.yml for the full
      # rationale on the Maven Local publishing chain.
      # core 经 asterLibs.* 依赖共享版本目录，必须先 publish 它。
      - name: Publish version catalog to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      - name: Publish aster-lang-core to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-core
        run: ./gradlew compileJava publishToMavenLocal -x test

      # 语言包从 aster-lang-locales（catalog 驱动）一次性发布。verifyLexiconParity
      # 需 aster-lang-core sibling（本 workspace 已 checkout 到 aster-lang-core）。
      - name: Publish locale packs to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        run: |
          cd aster-lang-locales && ./gradlew publishToMavenLocal -x test

      # hi 语言包（core testRuntimeOnly/langPacks 依赖，见上方 checkout 注释）。
      - name: Publish aster-lang-hi to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-hi
        run: ./gradlew publishToMavenLocal -x test

      # 值级词法同步守门（此前只 core/hi/locales 自身 CI 调，ts 自身 CI 不调=盲区：
      # 改 ts 侧 @generated lexicon 值时 ts 自身 CI 不守，靠 core 变更兜底）。此 parity
      # job 已 checkout+publish core/locales/hi 源码 + build 了 ts → 复用同套发布链跑
      # exportLexicons + verify-lexicon-sync，补齐 ts 侧对 Java↔TS 词法值同步的守门。
      - name: Verify lexicon sync (Java exportLexicons ↔ TS)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          # self(ts) checkout 在 aster-lang-ts/ 子目录，siblings 平铺在 job root。
          (cd aster-lang-core && ./gradlew exportLexicons -x test)
          node aster-lang-ts/dist/scripts/verify-lexicon-sync.js \
            aster-lang-core/build/generated/lexicons/lexicons.json

      - name: Publish aster-lang-runtime to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-runtime
        run: ./gradlew publishToMavenLocal -x test

      - name: Publish corpus to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test/packages/jvm
        run: ./gradlew publishToMavenLocal -x test

      - name: Run tier1-parity strict gate (parse, PR-blocking)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=parse

      # Phase B IR fingerprint parity — report-only for first cycle.
      # See aster-lang-test/.github/workflows/ci.yml for full rationale.
      - name: Run tier1-parity (IR fingerprint, report-only)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=ir --report-only | tee parity-tier1-ir-report.md

      # Phase C evaluator parity — report-only first cycle.
      - name: Run tier1-parity (eval, report-only)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=eval --report-only | tee parity-tier1-eval-report.md

      - name: Upload parity reports
        if: always() && (steps.changed.outputs.parity == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          name: parity-tier1-${{ github.run_id }}
          path: |
            aster-lang-test/parity-tier1-report.json
            aster-lang-test/parity-tier1-ir-report.md
            aster-lang-test/parity-tier1-eval-report.md
          if-no-files-found: warn
