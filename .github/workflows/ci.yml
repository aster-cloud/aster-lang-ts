name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # version is read from package.json's "packageManager"
          package_json_file: package.json

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # P0-R14: vendor tarball SLA enforcement (mirrors aster-cloud pattern)
      # `@aster-cloud/aster-lang-test` 当前通过 file:vendor/... 消费——
      # npm token 缺 @aster-cloud org publish 权限，registry 仅有 0.0.2，
      # 而 aster-lang-ts 需要 0.0.3。vendor/README.md 必须声明 Owner +
      # Removal Conditions，防止 tarball 成为永久技术债。
      - name: Vendor tarball SLA enforcement
        run: |
          set -e
          if grep -q "file:vendor/" package.json; then
            echo "Detected file:vendor/ dependency. Checking SLA documentation..."
            if [ ! -f vendor/README.md ]; then
              echo "ERROR: file:vendor/ dependency requires vendor/README.md"
              exit 1
            fi
            if ! grep -q "Owner:" vendor/README.md; then
              echo "ERROR: vendor/README.md must declare an Owner"
              exit 1
            fi
            if ! grep -q "删除条件\|Removal Conditions\|临时 SLA" vendor/README.md; then
              echo "ERROR: vendor/README.md must declare removal conditions / SLA"
              exit 1
            fi
            echo "OK: vendor/ SLA documentation present"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Run unit tests with coverage
        run: pnpm run test:unit:coverage

      - name: Check coverage threshold
        run: |
          pnpm run build
          npx c8 --check-coverage --lines 75 --branches 60 --functions 70 \
            node --test 'dist/test/unit/**/*.test.js' 'dist/test/type-checker/**/*.test.js'

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run golden tests
        run: pnpm run test:golden:run

      - name: Run property tests
        run: pnpm run test:property:run

      - name: Run fuzz tests
        run: pnpm run test:fuzz:run

      # P0-R15/R16/R17: artifact-level browser entry verification.
      # 源码层 AST scanner 看不到编译产物层的真实依赖闭包. R14 的 aster-cloud
      # CI build regression (vendor tarball typecheck-pii.js 拉入 server-side
      # typecheck.js → node:fs/path/perf_hooks) 证明必须在 package 自身 CI
      # 做 artifact-level smoke. 这一步从 dist/src/browser.js 做 BFS 闭包扫描,
      # 禁止任何 Node built-in (含 `node:*` scheme + bare specifier 如 `fs`/`path`)
      # 出现在 browser entry transitive closure. 用 `node:module.isBuiltin()` 作为
      # 权威源, 不再手维护 deny list.
      - name: Verify browser entry has no Node builtin deps
        run: node scripts/verify-browser-entry.mjs
