name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # version is read from package.json's "packageManager"
          package_json_file: package.json

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # P0-R14: vendor tarball SLA enforcement (mirrors aster-cloud pattern)
      # `@aster-cloud/aster-lang-test` 当前通过 file:vendor/... 消费——
      # npm token 缺 @aster-cloud org publish 权限，registry 仅有 0.0.2，
      # 而 aster-lang-ts 需要 0.0.3。vendor/README.md 必须声明 Owner +
      # Removal Conditions，防止 tarball 成为永久技术债。
      - name: Vendor tarball SLA enforcement
        run: |
          set -e
          if grep -q "file:vendor/" package.json; then
            echo "Detected file:vendor/ dependency. Checking SLA documentation..."
            if [ ! -f vendor/README.md ]; then
              echo "ERROR: file:vendor/ dependency requires vendor/README.md"
              exit 1
            fi
            if ! grep -q "Owner:" vendor/README.md; then
              echo "ERROR: vendor/README.md must declare an Owner"
              exit 1
            fi
            if ! grep -q "删除条件\|Removal Conditions\|临时 SLA" vendor/README.md; then
              echo "ERROR: vendor/README.md must declare removal conditions / SLA"
              exit 1
            fi
            echo "OK: vendor/ SLA documentation present"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Run unit tests with coverage
        run: pnpm run test:unit:coverage

      - name: Check coverage threshold
        run: |
          pnpm run build
          npx c8 --check-coverage --lines 75 --branches 60 --functions 70 \
            node --test 'dist/test/unit/**/*.test.js' 'dist/test/type-checker/**/*.test.js'

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run golden tests
        run: pnpm run test:golden:run

      - name: Run property tests
        run: pnpm run test:property:run

      - name: Run fuzz tests
        run: pnpm run test:fuzz:run

      # P0-R15/R16/R17: artifact-level browser entry verification.
      # 源码层 AST scanner 看不到编译产物层的真实依赖闭包. R14 的 aster-cloud
      # CI build regression (vendor tarball typecheck-pii.js 拉入 server-side
      # typecheck.js → node:fs/path/perf_hooks) 证明必须在 package 自身 CI
      # 做 artifact-level smoke. 这一步从 dist/src/browser.js 做 BFS 闭包扫描,
      # 禁止任何 Node built-in (含 `node:*` scheme + bare specifier 如 `fs`/`path`)
      # 出现在 browser entry transitive closure. 用 `node:module.isBuiltin()` 作为
      # 权威源, 不再手维护 deny list.
      - name: Verify browser entry has no Node builtin deps
        run: node scripts/verify-browser-entry.mjs

  # Strict tier1 dual-engine parity gate. Mirrors aster-lang-test +
  # aster-lang-core jobs so a TS parser/lexer/canonicalizer change that
  # breaks bidirectional parity is blocked at the source PR.
  parity-tier1:
    name: Strict tier1 parity — parse (TS ↔ Java)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # R-CI-1 fix: paths-filter needs a checkout to diff against. Do
      # the self-checkout first into a sub-path, then point paths-filter
      # at it with working-directory.
      - name: Self checkout
        uses: actions/checkout@v6
        with:
          path: aster-lang-ts
          fetch-depth: 0

      - name: Decide whether to run
        id: changed
        uses: dorny/paths-filter@v3
        with:
          working-directory: aster-lang-ts
          filters: |
            parity:
              # Anything that can change the parse surface — keep this
              # broad. False positives cost a CI minute; false negatives
              # let parser drift land silently. (Codex review R1 raised
              # the original list missed src/parser*, src/peg/**,
              # src/cst/**, src/lower_to_core.ts, src/core/**.)
              - 'src/parser.ts'
              - 'src/parser/**'
              - 'src/peg/**'
              - 'src/cst/**'
              - 'src/frontend/**'
              - 'src/config/**'
              - 'src/ast/**'
              - 'src/core/**'
              - 'src/lib/**'
              - 'src/types/**'
              - 'src/types.ts'
              - 'src/diagnostics/**'
              - 'src/lower_to_core.ts'
              - 'src/browser.ts'
              - 'src/index.ts'
              - 'src/manifest.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

      - name: Checkout aster-lang-test
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-test
          path: aster-lang-test
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout aster-lang-core
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout aster-lang-en
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-en
          path: aster-lang-en
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Checkout aster-lang-zh
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-zh
          path: aster-lang-zh
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Checkout aster-lang-de
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-de
          path: aster-lang-de
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Setup pnpm
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: pnpm/action-setup@v6
        with:
          package_json_file: aster-lang-ts/package.json

      - name: Setup Node
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - name: Setup Java
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build aster-lang-ts (the version under PR)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      # See aster-lang-test/.github/workflows/ci.yml for the full
      # rationale on the Maven Local publishing chain.
      - name: Publish aster-lang-core to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-core
        run: ./gradlew compileJava publishToMavenLocal -x test

      - name: Publish locale packs to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        run: |
          cd aster-lang-en && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-zh && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-de && ./gradlew publishToMavenLocal -x test

      - name: Publish corpus to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test/packages/jvm
        run: ./gradlew publishToMavenLocal -x test

      - name: Run tier1-parity strict gate (parse, PR-blocking)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=parse

      # Phase B IR fingerprint parity — report-only for first cycle.
      # See aster-lang-test/.github/workflows/ci.yml for full rationale.
      - name: Run tier1-parity (IR fingerprint, report-only)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=ir --report-only | tee parity-tier1-ir-report.md

      - name: Upload parity reports
        if: always() && (steps.changed.outputs.parity == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          name: parity-tier1-${{ github.run_id }}
          path: |
            aster-lang-test/parity-tier1-report.json
            aster-lang-test/parity-tier1-ir-report.md
          if-no-files-found: warn
